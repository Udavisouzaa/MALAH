<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALAH - Autenticação</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="login.css">
</head>
<body class="auth-body">

    <div class="auth-container">
        <div class="auth-card glass">
            <div class="auth-header">
                <a href="index.html" class="logo">MALAH</a>
                <p id="auth-subtitle">Acesse sua conta para continuar</p>
            </div>

            <div class="auth-tabs">
                <button class="auth-tab active" onclick="switchAuthTab('login')" id="tab-login">Entrar</button>
                <button class="auth-tab" onclick="switchAuthTab('register')" id="tab-register">Cadastrar</button>
            </div>

            <form id="auth-form" onsubmit="handleAuth(event)">
                <div id="register-fields" style="display: none;">
                    <div class="form-group">
                        <label for="auth-name">Nome Completo</label>
                        <input type="text" id="auth-name" class="form-input" placeholder="Seu nome">
                    </div>
                    <div class="form-group">
                        <label for="auth-type">Perfil de Uso</label>
                        <select id="auth-type" class="form-input">
                            <option value="sender">Quero Enviar Encomendas</option>
                            <option value="traveler">Sou Viajante Frequente</option>
                        </select>
                    </div>
                </div>

                <div class="form-group">
                    <label for="auth-email">E-mail</label>
                    <input type="email" id="auth-email" class="form-input" placeholder="seu@email.com" required>
                </div>

                <div class="form-group">
                    <label for="auth-password">Senha</label>
                    <input type="password" id="auth-password" class="form-input" placeholder="••••••••" required>
                </div>

                <div class="auth-error" id="auth-error"></div>

                <button type="submit" class="btn btn-primary btn-block" id="auth-btn">Entrar na Plataforma</button>
            </form>
        </div>
    </div>

    <!-- Supabase -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <!-- Auth Logic -->
    <script src="login.js"></script>
</body>
</html>
