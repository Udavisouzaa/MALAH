<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALAH - Painel de Controle</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-logo">
                <span class="logo-text">MALAH</span>
                <span class="badge" id="user-role-badge">Painel</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="#" class="nav-item active" id="nav-overview">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"></rect><rect x="14" y="3" width="7" height="7"></rect><rect x="14" y="14" width="7" height="7"></rect><rect x="3" y="14" width="7" height="7"></rect></svg>
                    Visão Geral
                </a>
                <a href="#" class="nav-item" id="nav-records">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
                    <span id="records-label">Meus Registros</span>
                </a>
                <a href="index.html" class="nav-item nav-logout">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                    Sair
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main">
            <header class="dashboard-header">
                <h1 id="page-title">Bem-vindo(a)</h1>
                <div class="user-profile">
                    <div class="avatar">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                    </div>
                </div>
            </header>

            <div class="dashboard-content">
                <!-- Stats Row -->
                <div class="stats-grid">
                    <div class="stat-card glass">
                        <h3 class="stat-title" id="stat1-title">Ativos</h3>
                        <div class="stat-value" id="stat1-val">0</div>
                    </div>
                    <div class="stat-card glass">
                        <h3 class="stat-title">Completados</h3>
                        <div class="stat-value">0</div>
                    </div>
                    <div class="stat-card glass">
                        <h3 class="stat-title">Status da Conta</h3>
                        <div class="stat-value text-accent">Verificada</div>
                    </div>
                </div>

                <!-- Data Table -->
                <div class="data-section glass">
                    <div class="data-header">
                        <h2 id="table-title">Registros Recentes</h2>
                        <a href="index.html#cadastro" class="btn btn-sm btn-primary">Adicionar Novo</a>
                    </div>
                    <div class="table-container">
                        <table class="data-table">
                            <thead>
                                <tr id="table-head">
                                    <!-- Populated via JS -->
                                </tr>
                            </thead>
                            <tbody id="table-body">
                                <!-- Populated via JS -->
                                <tr><td colspan="5" style="text-align: center; padding: 30px;">Carregando dados...</td></tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <!-- Supabase CDN and Client -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabaseClient.js"></script>
    <!-- Dashboard Logic -->
    <script src="dashboard.js"></script>
</body>
</html>
