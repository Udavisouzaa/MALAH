<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MALAH - Chat Seguro</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="dashboard.css">
    <link rel="stylesheet" href="chat.css">
</head>
<body class="dashboard-body">

    <div class="dashboard-layout">
        <!-- Sidebar -->
        <aside class="sidebar glass">
            <div class="sidebar-logo">
                <span class="logo-text">MALAH</span>
                <span class="badge">Chat Seguro</span>
            </div>
            
            <nav class="sidebar-nav">
                <a href="dashboard.html" class="nav-item">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M15 18l-6-6 6-6"/></svg>
                    Voltar ao Painel
                </a>
                <a href="#" class="nav-item active" style="margin-top:20px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"></path></svg>
                    Mensagens
                </a>
                <a href="verificacao.html" class="nav-item" style="margin-top:20px;">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"></path></svg>
                    Identidade (KYC)
                </a>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="dashboard-main chat-main">
            <div class="chat-container glass">
                <div class="chat-header">
                    <div class="chat-user-info">
                        <div class="avatar">
                            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>
                        </div>
                        <div>
                            <h3 id="chat-partner-name">Carregando...</h3>
                            <span class="status-badge status-pendente" id="chat-deal-status">Negociação Aberta</span>
                        </div>
                    </div>
                    <div class="chat-actions">
                        <button class="btn btn-primary" onclick="window.location.href='checkout.html'">Pagar Custódia</button>
                    </div>
                </div>

                <div class="chat-messages" id="chat-messages">
                    <!-- Messages will be injected here -->
                    <div class="message system">O chat MALAH é criptografado. Nunca transfira valores fora da plataforma.</div>
                </div>

                <form class="chat-input-area" id="chat-form">
                    <input type="text" id="chat-input" placeholder="Digite sua mensagem..." class="form-input" autocomplete="off" required>
                    <button type="submit" class="btn btn-primary">Enviar</button>
                </form>
            </div>
        </main>
    </div>

    <!-- Logic -->
    <script src="chat.js"></script>
</body>
</html>
